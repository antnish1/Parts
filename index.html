<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white p-6">

<div id="app"></div>

<script>
const SUPABASE_URL = "https://ubkwtjyvbdvepzbxoikq.supabase.co";
const SUPABASE_KEY = "sb_publishable_L-SrVLzVHoSt9OKGAu1eTQ_UslGY7m3";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- SAFE STORAGE ----------
function getUser() {
  try {
    return JSON.parse(localStorage.getItem("user"));
  } catch {
    localStorage.removeItem("user");
    return null;
  }
}

// ---------- INIT ----------
window.onload = () => {
  const user = getUser();
  if (user) {
    user.role === "admin" ? loadAdmin() : loadBranch();
  } else {
    loadLogin();
  }
};

// ---------- LOGIN UI ----------
function loadLogin() {
  document.getElementById("app").innerHTML = `
    <div class="min-h-screen flex flex-col justify-center items-center">
      <h1 class="text-3xl text-yellow-400 mb-6">Parts Connect Portal</h1>

      <div class="bg-gray-900 p-6 rounded-xl w-80 space-y-4">
        <select id="branch" class="w-full p-2 bg-black border border-gray-600">
          <option value="">Select Branch</option>
          <option>HQ</option>
          <option>JABALPUR</option>
        </select>

        <input id="password" type="password" placeholder="Password"
          class="w-full p-2 bg-black border border-gray-600"/>

        <button onclick="login()"
          class="w-full bg-yellow-400 text-black py-2 rounded">
          Login
        </button>
      </div>
    </div>
  `;
}

// ---------- LOGIN (SUPABASE) ----------
async function login() {

  const branch = document.getElementById("branch").value;
  const password = document.getElementById("password").value;

  if (!branch || !password) {
    alert("Fill all fields");
    return;
  }

  const { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("Branch", branch)
    .eq("Password", password)
    .single();

  if (error || !data) {
    alert("Invalid credentials");
    return;
  }

  localStorage.setItem("user", JSON.stringify({
    branch: data.Branch,
    role: data.Role,
    name: data.Name
  }));

  if (data.Role === "admin") {
    loadAdmin();
  } else {
    loadBranch();
  }
}

// ---------- BASIC SCREENS ----------
function loadBranch() {
  document.getElementById("app").innerHTML = `
    <h1 class="text-yellow-400">Branch Panel (Next Step)</h1>
  `;
}

function loadAdmin() {
  document.getElementById("app").innerHTML = `
    <h1 class="text-yellow-400">Admin Panel (Next Step)</h1>
  `;
}
</script>

</body>
</html>
