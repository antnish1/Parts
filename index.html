<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div id="app"></div>

<!-- Loader -->
<div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center">
  <div class="bg-white p-5 rounded shadow">Loading...</div>
</div>

<!-- Popup -->
<div id="popup" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-30">
  <div class="bg-white p-6 rounded shadow text-center">
    <p id="popupMsg" class="mb-4"></p>
    <button onclick="closePopup()" class="bg-blue-600 text-white px-4 py-2 rounded">OK</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzn1Meb_RHUkJeL48Xy5H4A0RqoPQPY14NDeWQ1TJlF6XET_-jmjdCjoCJG-EbRW9Yo/exec";
console.log("PART FETCH:", data);
let isSubmitting = false;
let isLoggingIn = false;

// ---------- SAFE STORAGE ----------
function getUser() {
  try {
    return JSON.parse(localStorage.getItem("user"));
  } catch (e) {
    localStorage.removeItem("user");
    return null;
  }
}

// ---------- UTIL ----------
function showLoader() {
  document.getElementById("loader").classList.remove("hidden");
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");
}

function showPopup(msg) {
  document.getElementById("popupMsg").innerText = msg;
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

// ---------- INIT ----------
window.onload = () => {
  const user = getUser();
  if (user) {
    user.role === "admin" ? loadAdmin() : loadBranch();
  } else {
    loadLogin();
  }
};

// ---------- LOGIN ----------
function loadLogin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Login</h2>

      <select id="branch" class="w-full p-2 border mb-3">
        <option value="">Select Branch</option>
        <option>DAMOH</option>
        <option>ANUPPUR</option>
        <option>DINDORI</option>
        <option>MANDLA</option>
        <option>NARSINGHPUR</option>
        <option>BALAGHAT</option>
        <option>SEONI</option>
        <option>KATNI</option>
        <option>JABALPUR</option>
        <option>HQ</option>
      </select>

      <input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3"/>

      <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 w-full rounded">
        Login
      </button>
    </div>
  `;
}

async function login() {

  if (isLoggingIn) return;
  isLoggingIn = true;

  const branchEl = document.getElementById("branch");
  const passwordEl = document.getElementById("password");

  if (!branchEl || !passwordEl) {
    showPopup("UI error: reload page");
    isLoggingIn = false;
    return;
  }

  const branch = branchEl.value;
  const password = passwordEl.value;

  if (!branch || !password) {
    showPopup("Please select branch and enter password");
    isLoggingIn = false;
    return;
  }

  showLoader();

  try {
    const payload = {
      action: "login",
      branch: branch,
      password: password
    };

    const res = await fetch(API, {
      method: "POST",
      
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));

      if (data.role === "admin") {
        loadAdmin();
      } else {
        loadBranch();
      }

    } else {
      showPopup("Invalid credentials!");
    }

  } catch (err) {
    console.error(err);
    showPopup("Network error!");
  }

  hideLoader();
  isLoggingIn = false;
}

function logout() {
  if (isSubmitting) {
    showPopup("Please wait, submitting...");
    return;
  }

  localStorage.removeItem("user");
  document.getElementById("app").innerHTML = "";

  setTimeout(loadLogin, 100);
}

// ---------- BRANCH ----------
function loadBranch() {
  const user = getUser();

  if (!user || !user.branch) {
    showPopup("Session error, please login again");
    logout();
    return;
  }

  document.getElementById("app").innerHTML = `
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">

      <div class="flex justify-between mb-4">
        <p class="font-semibold">Branch: ${user.branch}</p>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>

      <!-- HEADER -->
      <div class="grid grid-cols-2 gap-4 mb-4">
        <select id="orderType" class="border p-2">
          <option value="">Order Type</option>
          <option>SOP</option>
          <option>VOR</option>
          <option>SPL</option>
          <option>ZMAC</option>
        </select>

        <select id="orderFor" class="border p-2">
          <option value="">Order For</option>
          <option>Customer</option>
          <option>Stock</option>
        </select>

        <input id="machineNo" placeholder="Machine Number" class="border p-2"/>
        <input id="contactNo" placeholder="Contact Number" class="border p-2"/>
      </div>

      <div class="mb-4">
        <p>Customer Name:</p>
        <p id="customerName" class="font-semibold text-blue-600">--</p>
      </div>

      <!-- TABLE -->
      <table class="w-full border text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th>Part No</th>
            <th>Qty</th>
            <th>Part Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="mt-4 flex gap-3">
        <button onclick="addRow()" class="bg-green-600 text-white px-4 py-2 rounded">+ Add Row</button>
        <button onclick="submitAll()" class="bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
      </div>
    </div>
  `;

  // ✅ MACHINE FETCH (POST — FIXED)
  document.getElementById("machineNo").addEventListener("blur", async function () {
    const machineNo = this.value.trim();
    if (!machineNo) return;

    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "getMachine",
          machineNo: machineNo
        })
      });

      const data = await res.json();
      document.getElementById("customerName").innerText = data.customer || "Not Found";

    } catch (err) {
      document.getElementById("customerName").innerText = "Error";
    }
  });

  addRow();
}

function addRow() {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td><input class="partNo border p-1 w-full"/></td>
    <td><input type="number" class="qty border p-1 w-full"/></td>
    <td class="desc text-gray-600"></td>
    <td><button onclick="this.closest('tr').remove()">X</button></td>
  `;

  // ✅ PART FETCH (POST — FIXED)
  row.querySelector(".partNo").addEventListener("blur", async function () {
    const partNo = this.value.trim();
    if (!partNo) return;

    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "getPart",
          partNo: partNo
        })
      });

      const data = await res.json();
      row.querySelector(".desc").innerText = data.description || "Not Found";

    } catch (err) {
      row.querySelector(".desc").innerText = "Error";
    }
  });

  document.getElementById("tableBody").appendChild(row);
}

// ---------- SUBMIT ----------
async function submitAll() {
  if (isSubmitting) return;

  const user = getUser();

  const orderType = document.getElementById("orderType").value;
  const orderFor = document.getElementById("orderFor").value;
  const machineNo = document.getElementById("machineNo").value;
  const customerName = document.getElementById("customerName").innerText;
  const contactNo = document.getElementById("contactNo").value;

  if (!orderType || !orderFor || !machineNo || !contactNo) {
    showPopup("Fill all header fields!");
    return;
  }

  const rows = document.querySelectorAll("#tableBody tr");

  isSubmitting = true;
  showLoader();

  try {
    for (let row of rows) {

      const partNo = row.querySelector(".partNo").value.trim();
      const qty = row.querySelector(".qty").value;
      const desc = row.querySelector(".desc").innerText.trim();

      if (!partNo || !qty) {
        showPopup("Part No and Qty required");
        return;
      }

      if (!desc || desc === "Not Found") {
          showPopup("Invalid Part Number in one of the rows");
          continue; // skip instead of stopping everything
        }

      const payload = {
        action: "submit",
        branch: user.branch,
        orderType,
        orderFor,
        machineNo,
        customerName,
        contactNo,
        partNo,
        qty,
        description: desc
      };

      console.log("SENDING:", payload);

      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      console.log("RESPONSE:", result);
    }

    showPopup("Submitted successfully!");
    document.getElementById("tableBody").innerHTML = "";
    addRow();

  } catch (err) {
    console.error(err);
    showPopup("Error submitting!");
  }

  hideLoader();
  isSubmitting = false;
}
// ---------- ADMIN ----------
function loadAdmin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
      <div class="flex justify-between mb-4">
        <h2 class="text-xl font-bold">Admin Panel</h2>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>

      <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-2 rounded mb-3">
        Load Data
      </button>

      <table class="w-full border text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th>Branch</th>
            <th>Part No</th>
            <th>Qty</th>
            <th>Order No</th>
            <th>Status</th>
            <th>Save</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </div>
  `;
}

async function loadData() {
  showLoader();

  const res = await fetch(API, {
    method: "POST",
  
    body: JSON.stringify({ action: "getRequests" })
  });

  const data = await res.json();
  hideLoader();

  let html = "";

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.branch}</td>
        <td>${d.partNo}</td>
        <td>${d.qty}</td>
        <td><input value="${d.orderNo || ""}" id="order${d.row}" class="border p-1"/></td>
        <td>
          <select id="status${d.row}">
            <option ${d.status=="Pending"?"selected":""}>Pending</option>
            <option ${d.status=="Ordered"?"selected":""}>Ordered</option>
            <option ${d.status=="Delivered"?"selected":""}>Delivered</option>
          </select>
        </td>
        <td><button onclick="saveRow(${d.row})" class="bg-green-600 text-white px-2 py-1">Save</button></td>
      </tr>
    `;
  });

  document.getElementById("adminTable").innerHTML = html;
}

async function saveRow(row) {
  showLoader();

  const orderNo = document.getElementById("order"+row).value;
  const status = document.getElementById("status"+row).value;

  await fetch(API, {
    method: "POST",
  
    body: JSON.stringify({
      action: "updateOrder",
      row: row,
      orderNo: orderNo,
      status: status
    })
  });

  hideLoader();
  showPopup("Updated!");
}
</script>

</body>
</html>
