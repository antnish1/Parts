<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div id="app"></div>

<!-- Loader -->
<div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center">
  <div class="bg-white p-5 rounded shadow">Loading...</div>
</div>

<!-- Popup -->
<div id="popup" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-30">
  <div class="bg-white p-6 rounded shadow text-center">
    <p id="popupMsg" class="mb-4"></p>
    <button onclick="closePopup()" class="bg-blue-600 text-white px-4 py-2 rounded">OK</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzRNr0TPfv1y91aBPclvX_0bwAMPiQ2OPVmbBFzJWi8nWpX_bI79RJzEEB_8hROiyaV/exec";
let isSubmitting = false;
// ---------- UTIL ----------
function showLoader() {
  document.getElementById("loader").classList.remove("hidden");
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");
}

function showPopup(msg) {
  document.getElementById("popupMsg").innerText = msg;
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

// ---------- INIT ----------
window.onload = () => {
  const user = JSON.parse(localStorage.getItem("user"));
  if (user) {
    user.role === "admin" ? loadAdmin() : loadBranch();
  } else loadLogin();
};

// ---------- LOGIN ----------
function loadLogin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Login</h2>
      <input id="email" placeholder="Email" class="w-full p-2 border mb-3"/>
      <input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3"/>
      <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 w-full rounded">Login</button>
    </div>
  `;
}

let isLoggingIn = false;

async function login() {

  if (isLoggingIn) return;
  isLoggingIn = true;

  showLoader();

  const payload = {
    action: "login",
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  hideLoader();
  isLoggingIn = false;

  if (data.status === "success") {
    localStorage.setItem("user", JSON.stringify(data));
    data.role === "admin" ? loadAdmin() : loadBranch();
  } else {
    showPopup("Invalid login!");
  }
}

function logout() {

  if (isSubmitting) {
    showPopup("Please wait, data is being submitted...");
    return;
  }

  localStorage.removeItem("user");

  document.getElementById("app").innerHTML = "";

  setTimeout(() => {
    loadLogin();
  }, 100);
}

// ---------- BRANCH ----------
function loadBranch() {
  const user = JSON.parse(localStorage.getItem("user"));

  document.getElementById("app").innerHTML = `
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">

      <div class="flex justify-between mb-4">
        <div>
          <h2 class="text-xl font-bold">Branch Panel</h2>
          <p class="text-gray-600">Branch: ${user.branch}</p>
        </div>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>

      <table class="w-full border text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th class="border p-2">SOP/VOR</th>
            <th class="border p-2">Part No</th>
            <th class="border p-2">Qty</th>
            <th class="border p-2">Comment</th>
            <th class="border p-2">Description</th>
            <th class="border p-2">Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="mt-4 flex gap-3">
        <button onclick="addRow()" class="bg-green-600 text-white px-4 py-2 rounded">+ Add Row</button>
        <button onclick="submitAll()" class="bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
      </div>
    </div>
  `;

  addRow();
}

function addRow() {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td class="border p-2"><select class="sop border p-1"><option>SOP</option><option>VOR</option></select></td>
    <td class="border p-2"><input class="partNo border p-1 w-full"/></td>
    <td class="border p-2"><input type="number" class="qty border p-1 w-full"/></td>
    <td class="border p-2"><input class="comment border p-1 w-full"/></td>
    <td class="border p-2 desc"></td>
    <td class="border p-2 text-center"><button onclick="this.closest('tr').remove()">X</button></td>
  `;

  row.querySelector(".partNo").addEventListener("blur", async function () {
    const partNo = this.value;
    if (!partNo) return;

    const res = await fetch(`${API}?partNo=${partNo}`);
    const data = await res.json();
    row.querySelector(".desc").innerText = data.description;
  });

  document.getElementById("tableBody").appendChild(row);
}

// ---------- VALIDATION + SUBMIT ----------
async function submitAll() {

  if (isSubmitting) return;

  isSubmitting = true;

  const rows = document.querySelectorAll("#tableBody tr");
  const user = JSON.parse(localStorage.getItem("user"));

  for (let row of rows) {
    const partNo = row.querySelector(".partNo").value;
    const qty = row.querySelector(".qty").value;
    const comment = row.querySelector(".comment").value;
    const desc = row.querySelector(".desc").innerText;

    if (!partNo || !qty || !comment || !desc) {
      showPopup("All fields are mandatory!");
      isSubmitting = false;
      return;
    }
  }

  showLoader();

  try {
    for (let row of rows) {
      const payload = {
        action: "submit",
        email: user.email,
        branch: user.branch,
        sop: row.querySelector(".sop").value,
        partNo: row.querySelector(".partNo").value,
        qty: row.querySelector(".qty").value,
        comment: row.querySelector(".comment").value,
        description: row.querySelector(".desc").innerText
      };

      await fetch(API, {
        method: "POST",
        body: JSON.stringify(payload)
      });
    }

    showPopup("Data submitted successfully!");
    document.getElementById("tableBody").innerHTML = "";
    addRow();

  } catch (err) {
    showPopup("Error submitting data!");
  }

  hideLoader();
  isSubmitting = false;
}
// ---------- ADMIN ----------
function loadAdmin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
      <div class="flex justify-between mb-4">
        <h2 class="text-xl font-bold">Admin Panel</h2>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>

      <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-2 rounded mb-3">
        Load Data
      </button>

      <table class="w-full border text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th>Branch</th>
            <th>Part No</th>
            <th>Qty</th>
            <th>Order No</th>
            <th>Status</th>
            <th>Save</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </div>
  `;
}

async function loadData() {
  showLoader();

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "getRequests" })
  });

  const data = await res.json();
  hideLoader();

  let html = "";

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.branch}</td>
        <td>${d.partNo}</td>
        <td>${d.qty}</td>
        <td><input value="${d.orderNo || ""}" id="order${d.row}" class="border p-1"/></td>
        <td>
          <select id="status${d.row}">
            <option ${d.status=="Pending"?"selected":""}>Pending</option>
            <option ${d.status=="Ordered"?"selected":""}>Ordered</option>
            <option ${d.status=="Delivered"?"selected":""}>Delivered</option>
          </select>
        </td>
        <td><button onclick="saveRow(${d.row})" class="bg-green-600 text-white px-2 py-1">Save</button></td>
      </tr>
    `;
  });

  document.getElementById("adminTable").innerHTML = html;
}

async function saveRow(row) {
  showLoader();

  const orderNo = document.getElementById("order"+row).value;
  const status = document.getElementById("status"+row).value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "updateOrder",
      row: row,
      orderNo: orderNo,
      status: status
    })
  });

  hideLoader();
  showPopup("Updated!");
}
</script>

</body>
</html>
