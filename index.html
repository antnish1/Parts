<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white p-6">

<div id="app"></div>

<script>
const SUPABASE_URL = "https://ubkwtjyvbdvepzbxoikq.supabase.co";
const SUPABASE_KEY = "sb_publishable_L-SrVLzVHoSt9OKGAu1eTQ_UslGY7m3";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- STORAGE ----------
function getUser() {
  return JSON.parse(localStorage.getItem("user"));
}

// ---------- INIT ----------
window.onload = () => {
  const user = getUser();
  if (user) loadBranch();
  else loadLogin();
};

// ---------- LOGIN ----------
async function loadLogin() {
  document.getElementById("app").innerHTML = `
    <div class="min-h-screen flex flex-col justify-center items-center">
      <h1 class="text-3xl text-yellow-400 mb-6">Parts Connect Portal</h1>

      <div class="bg-gray-900 p-6 rounded-xl w-80 space-y-4">
        <select id="branch" class="w-full p-2 bg-black border border-gray-600"></select>
        <input id="password" type="password" placeholder="Password"
          class="w-full p-2 bg-black border border-gray-600"/>
        <button onclick="login()" class="w-full bg-yellow-400 text-black py-2 rounded">
          Login
        </button>
      </div>
    </div>
  `;

  const { data } = await db.from("users").select("Branch");
  const unique = [...new Set(data.map(d => d.Branch))];

  const el = document.getElementById("branch");
  el.innerHTML = `<option value="">Select Branch</option>`;
  unique.forEach(b => el.innerHTML += `<option>${b}</option>`);
}

async function login() {
  const branch = document.getElementById("branch").value;
  const password = document.getElementById("password").value;

  const { data } = await db
    .from("users")
    .select("*")
    .eq("Branch", branch)
    .eq("Password", password)
    .single();

  if (!data) return alert("Invalid");

  localStorage.setItem("user", JSON.stringify(data));
  loadBranch();
}

// ---------- BRANCH PANEL ----------
function loadBranch() {
  const user = getUser();

  document.getElementById("app").innerHTML = `
    <div class="max-w-6xl mx-auto space-y-4">

      <div class="flex justify-between items-center bg-gray-900 px-5 py-3 rounded-xl border border-gray-700">
        <p class="text-yellow-400 font-semibold">${user.Branch}</p>

        <button onclick="logout()"
          class="bg-yellow-400 px-4 py-2 text-black rounded">
          Logout
        </button>
      </div>

      <div id="main"></div>
    </div>
  `;

  loadCreateOrder();
}

function logout() {
  localStorage.clear();
  loadLogin();
}

// ---------- CREATE ORDER ----------
function loadCreateOrder() {

  document.getElementById("main").innerHTML = `

  <div class="space-y-4">

    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 grid grid-cols-2 gap-3">
      <input id="machineNo" placeholder="Machine Number" class="bg-black border p-2"/>
      <input id="customerName" placeholder="Customer Name" class="bg-black border p-2"/>
    </div>

    <div class="bg-gray-900 p-5 rounded-xl border border-gray-700">

      <table class="w-full text-sm border border-gray-700 bg-gray-800">
        <thead class="bg-black text-yellow-400">
          <tr>
            <th>Part No</th>
            <th>Qty</th>
            <th>Description</th>
            <th>DNP</th>
            <th>Category</th>
            <th>Value</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <div class="mt-4 flex gap-3">
        <button onclick="addRow()" class="bg-yellow-400 px-4 py-2 text-black">+ Add</button>
        <button onclick="submitOrder()" class="bg-green-500 px-4 py-2 text-black">Submit</button>
      </div>

      <div class="mt-4 text-right text-yellow-400">
        Total: ₹ <span id="total">0</span>
      </div>

    </div>
  </div>
  `;

  addRow();

  document.getElementById("machineNo").addEventListener("blur", async function () {
    const { data } = await db
      .from("machine_master")
      .select("*")
      .eq("MachineNo", this.value)
      .single();

    if (data) {
      document.getElementById("customerName").value = data.CustomerName;
    }
  });
}

// ---------- ADD ROW ----------
function addRow() {

  const row = document.createElement("tr");

  row.innerHTML = `
    <td><input class="partNo bg-black w-full"/></td>
    <td><input type="number" class="qty bg-black w-full"/></td>
    <td class="desc text-center"></td>
    <td class="dnp text-center"></td>
    <td class="cat text-center"></td>
    <td class="value text-center"></td>
    <td><button onclick="this.closest('tr').remove(); updateTotal()">X</button></td>
  `;

  row.querySelector(".partNo").addEventListener("blur", async function () {

    const { data } = await db
      .from("part_master")
      .select("*")
      .eq("PartNo", this.value)
      .single();

    if (!data) return alert("Part not found");

    row.querySelector(".desc").innerText = data.Description;
    row.querySelector(".dnp").innerText = data.DNP;
    row.querySelector(".cat").innerText = data.Cat1;

    calculate(row);
  });

  row.querySelector(".qty").addEventListener("input", () => calculate(row));

  document.getElementById("tableBody").appendChild(row);
}

// ---------- CALC ----------
function calculate(row) {
  const dnp = Number(row.querySelector(".dnp").innerText) || 0;
  const qty = Number(row.querySelector(".qty").value) || 0;
  const val = dnp * qty;

  row.querySelector(".value").innerText = val;
  updateTotal();
}

// ---------- TOTAL ----------
function updateTotal() {
  let total = 0;
  document.querySelectorAll(".value").forEach(v => {
    total += Number(v.innerText) || 0;
  });
  document.getElementById("total").innerText = total;
}

// ---------- SUBMIT ----------
async function submitOrder() {

  const user = getUser();

  const machineNo = document.getElementById("machineNo").value;
  const customerName = document.getElementById("customerName").value;

  if (!machineNo || !customerName) {
    alert("Fill machine & customer");
    return;
  }

  const rows = document.querySelectorAll("#tableBody tr");

  const orderNo = "T" + Math.floor(1000000 + Math.random() * 9000000);

  const inserts = [];

  rows.forEach(r => {
    const partNo = r.querySelector(".partNo").value;
    const qty = r.querySelector(".qty").value;
    const desc = r.querySelector(".desc").innerText;
    const dnp = Number(r.querySelector(".dnp").innerText) || 0;

    if (!partNo || !qty) return;

    inserts.push({
      Branch: user.Branch,
      MachineNo: machineNo,
      CustomerName: customerName,
      PartNo: partNo,
      Qty: qty,
      Description: desc,
      DNP: dnp,
      Value: dnp * qty,
      OrderNo: orderNo,
      Status: "Pending"
    });
  });

  if (inserts.length === 0) {
    alert("Add items");
    return;
  }

  const { error } = await db.from("requests").insert(inserts);

  if (error) {
    console.error(error);
    alert("Submit failed");
    return;
  }

  alert("Submitted ✅ Order No: " + orderNo);

  loadCreateOrder();
}
</script>

</body>
</html>
