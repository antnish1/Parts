<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white p-6">

<div id="app"></div>

<script>
const SUPABASE_URL = "https://ubkwtjyvbdvepzbxoikq.supabase.co";
const SUPABASE_KEY = "sb_publishable_L-SrVLzVHoSt9OKGAu1eTQ_UslGY7m3";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- STORAGE ----------
function getUser() {
  try {
    return JSON.parse(localStorage.getItem("user"));
  } catch {
    return null;
  }
}

// ---------- INIT ----------
window.onload = () => {
  const user = getUser();
  if (user) loadBranch();
  else loadLogin();
};

// ---------- LOGIN ----------
async function loadLogin() {

  document.getElementById("app").innerHTML = `
    <div class="min-h-screen flex flex-col justify-center items-center">
      <h1 class="text-3xl text-yellow-400 mb-6">Parts Connect Portal</h1>

      <div class="bg-gray-900 p-6 rounded-xl w-80 space-y-4">
        
        <select id="branch" class="w-full p-2 bg-black border border-gray-600">
          <option>Loading...</option>
        </select>

        <input id="password" type="password" placeholder="Password"
          class="w-full p-2 bg-black border border-gray-600"/>

        <button onclick="login()"
          class="w-full bg-yellow-400 text-black py-2 rounded">
          Login
        </button>
      </div>
    </div>
  `;

  const { data } = await db.from("users").select("Branch");

  const unique = [...new Set(data.map(d => d.Branch))];

  const el = document.getElementById("branch");
  el.innerHTML = `<option value="">Select Branch</option>`;
  unique.forEach(b => el.innerHTML += `<option>${b}</option>`);
}

async function login() {

  const branch = document.getElementById("branch").value;
  const password = document.getElementById("password").value;

  const { data } = await db
    .from("users")
    .select("*")
    .eq("Branch", branch)
    .eq("Password", password)
    .single();

  if (!data) return alert("Invalid");

  localStorage.setItem("user", JSON.stringify(data));
  loadBranch();
}

// ---------- BRANCH PANEL ----------
function loadBranch() {

  const user = getUser();

  document.getElementById("app").innerHTML = `
    <div class="max-w-6xl mx-auto space-y-4">

      <div class="flex justify-between items-center bg-gray-900 px-5 py-3 rounded-xl border border-gray-700">
        <p class="text-yellow-400 font-semibold">${user.Branch}</p>

        <button onclick="logout()"
          class="bg-yellow-400 px-4 py-2 text-black rounded">
          Logout
        </button>
      </div>

      <div id="main"></div>
    </div>
  `;

  loadCreateOrder();
}

function logout() {
  localStorage.clear();
  loadLogin();
}

// ---------- CREATE ORDER ----------
function loadCreateOrder() {

  document.getElementById("main").innerHTML = `
    <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 space-y-3">

      <div class="grid grid-cols-4 gap-3">
        <input id="machineNo" placeholder="Machine Number" class="input"/>
        <input id="customerName" placeholder="Customer Name" class="input"/>
      </div>

    </div>
  `;

  // 🔥 MACHINE FETCH (SUPABASE)
  document.getElementById("machineNo").addEventListener("blur", async function () {

    const machineNo = this.value.trim();
    if (!machineNo) return;

    const { data, error } = await db
      .from("machine_master")
      .select("*")
      .eq("MachineNo", machineNo)
      .single();

    if (data) {
      document.getElementById("customerName").value = data.CustomerName;
    } else {
      document.getElementById("customerName").value = "";
      alert("Machine not found");
    }

  });
}
</script>

</body>
</html>
