:root {

body {

.pc-icon {

  vertical-align: middle;
}

.pc-btn-inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

    
.menu-btn {
  position: relative;
  padding: 10px 18px;
  background: rgba(170, 205, 220, 0.08);

  color: var(--pc-text);

  letter-spacing: 0.3px;
  transition: all 0.22s ease;
}

/* 🔥 HOVER EFFECT */
.menu-btn:hover {
  background: linear-gradient(135deg, var(--pc-secondary), var(--pc-primary));
  color: #0f1720;
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(129, 166, 198, 0.28);
}

/* 🔥 ACTIVE CLICK */
.menu-btn:active {
  transform: scale(0.98);
}

/* 🔥 SUBTLE GLOW */
.menu-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
}

.menu-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.25s;
  box-shadow: 0 0 0 2px rgba(170, 205, 220, 0.28) inset;
}

.menu-btn:hover::after {
  opacity: 1;
}

    

.active-tab {
  background: linear-gradient(135deg, var(--pc-secondary), var(--pc-primary));
  color: #0f1720;
  box-shadow: 0 6px 18px rgba(129, 166, 198, 0.25);
}

.top-btn {
  padding: 8px 16px;
  border-radius: 10px;
  background: rgba(170, 205, 220, 0.08);
  border: 1px solid var(--pc-border);
  color: var(--pc-text);
  font-weight: 600;
  transition: all 0.22s ease;
}

.top-btn:hover {
  background: linear-gradient(135deg, var(--pc-secondary), var(--pc-primary));
  color: #0f1720;
  transform: translateY(-1px);
}


.active-top-btn {
  background: linear-gradient(135deg, var(--pc-secondary), var(--pc-primary));
  color: #0f1720;
}
.logout-btn {
  background: #ef4444;
  color: white;
  border: none;
}

.logout-btn {
  background: #b85c5c;
  color: #fff;
  border: 1px solid #9f4c4c;
}

.logout-btn:hover {
  background: #a54b4b;
}
    

input:focus, select:focus, button:focus {
  box-shadow: 0 0 0 3px rgba(170, 205, 220, 0.35);
  border-color: var(--pc-secondary) !important;
}

.pc-field {
  background: #16202a;
  border: 1px solid var(--pc-border);
  color: var(--pc-text);
  border-radius: 10px;
  padding: 10px 12px;
  width: 100%;
  transition: all 0.2s ease;

.pc-field::placeholder {
  color: var(--pc-text-muted);
}

.pc-field:focus {
  outline: none;
  border-color: var(--pc-secondary);
  box-shadow: 0 0 0 3px rgba(170, 205, 220, 0.25);

.pc-section {

  border: 1px solid var(--pc-border);
  border-radius: 12px;

/* Smooth UI feel */
* {
  transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

/* Card hover lift */
.pc-section:hover {
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
}

/* Table polish */
table {
  border-color: var(--pc-border) !important;
}

thead th {
  font-weight: 700;
  letter-spacing: 0.04em;

tbody tr {
  border-bottom: 1px solid rgba(170, 205, 220, 0.16);

tbody tr:hover {
  background: rgba(170, 205, 220, 0.06);

/* Generic soft button hover */
button:hover {
  filter: brightness(1.03);
}

/* Disabled fields look intentional */
input[readonly], select:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

/* Better numeric emphasis */
#total {
  color: var(--pc-secondary);
  font-weight: 800;
}

    
</style>

// ---------- CALC ----------
function calc(tr){
const dnp = Number(tr.querySelector(".dnp").innerText) || 0;
const qty = Number(tr.querySelector(".qty").value) || 0;

tr.querySelector(".val").innerText = dnp * qty;
calcTotal();
}

function calcTotal(){

document.querySelectorAll(".val").forEach(v => t += Number(v.innerText)||0);
document.getElementById("total").innerText = t;

async function submitOrder(){

const user = getUser();
const machineNo = document.getElementById("machineNo").value;
const customerName = document.getElementById("customerName").value;


const orderType = document.getElementById("orderType").value;
const orderFor = document.getElementById("orderFor").value;
const approvedBy = document.getElementById("approvedBy").value;
const machineType = document.getElementById("machineType").value;

// BASIC REQUIRED
if(!orderType || !orderFor){
  return showPopup("Order Details are mandatory ❗");
}

// VOR RULE
if(orderType === "VOR"){
  if(!approvedBy || !machineNo || !customerName || !machineType){
    return showPopup("All fields mandatory for VOR ❗");
  }
}

// SOP / ZSPL RULES
if(orderType === "SOP" || orderType === "ZSPL"){

  if(!orderFor){
    return showPopup("Order For required ❗");
  }

  if(orderFor === "Customer"){
    if(!machineNo || !machineType){
      return showPopup("Machine No & Type required ❗");
    }
  }
}
  
if(orderFor === "Customer" && (!machineNo || !customerName)){
  return showPopup("Fill machine & customer ❗");
}

const rows = document.querySelectorAll("#tbody tr");

const orderNo = "T" + Math.floor(1000000 + Math.random()*9000000);

const inserts = [];

rows.forEach(r=>{

  const part = r.querySelector(".part").value.trim();
  const qty = r.querySelector(".qty").value.trim();
  const desc = r.querySelector(".desc").innerText;
  const dnp = Number(r.querySelector(".dnp").innerText)||0;

  // ❗ VALIDATION
  if(part && !qty){
    showPopup("Qty is required for all parts ❗");
    throw new Error("Qty missing");
  }

  if(!part) return;

inserts.push({
  Branch: user.Branch,

  OrderType: orderType,
  OrderFor: orderFor,

  EmployeeName: user.Name || "",
  ApprovedBy: approvedBy,
  WarrantyStatus: machineType,
  CallID: document.getElementById("callId").value || "",
  MachineNo: machineNo,
  CustomerName: customerName,

  PartNo: part,
  Qty: qty,
  Description: desc,
  DNP: dnp,
  Value: dnp * qty,

  OrderNo: orderNo,
  Status: "Pending"
});

});



if(!inserts.length){
  return showPopup("At least one Part Number is required ❗");
}

showLoader();

const { error } = await db.from("requests").insert(inserts);

hideLoader();

if(error) return showPopup("Submit failed");

showPopup("Submitted ✅ Order No: "+orderNo);

loadCreate();
}

function formatDate(val){

  if(!val) return "-";

  // ✅ Case 1: ISO date (ProcessedDate)
  if(val.includes("T")){
    const d = new Date(val);
    return d.toLocaleDateString("en-GB"); // dd/mm/yyyy
  }

  // ✅ Case 2: Excel number (OrderRegDt, BillingDt)
  if(!isNaN(val)){
    const excelDate = new Date((val - 25569) * 86400 * 1000);
    return excelDate.toLocaleDateString("en-GB");
  }

  return val;
}

async function processOrder(orderNo){

  const inputOrderNo = document.getElementById("processOrderNo").value.trim();

  if(!inputOrderNo){
    return showPopup("Enter Order No ❗");
  }

  // ✅ SAME ORDER CHECK
  if(inputOrderNo === orderNo){
    return showPopup("Already same Order No ❗");
  }

  // ✅ 🔥 ADD THIS BLOCK HERE
  const { data: existing } = await db
    .from("requests")
    .select("OrderNo")
    .eq("OrderNo", inputOrderNo);

  if(existing && existing.length > 0){
    return showPopup("Order No already exists ❗");
  }

  // ⬇️ THIS WAS ALREADY THERE
  showLoader();

  const { error } = await db
    .from("requests")
    .update({ 
      OrderNo: inputOrderNo,
      Status: "Processed"
    })
    .eq("OrderNo", orderNo);

  hideLoader();

  if(error){
    console.error(error);
    return showPopup("Error updating Order ❗");
  }

  showPopup("Order Updated & Processed ✅");

  loadAdmin("Processed");
}

      .from("requests")
      .select("*")
      .eq("OrderNo", orderNo)
      .eq("PartNo", partNo.replace(/\s/g,""))
      .maybeSingle();
      console.log("🧾 DB MATCH RESULT:", existing);
   if(!existing){
      console.log("❌ NO MATCH FOUND");
      console.log("Excel:", orderNo, partNo);
      skipped++;
      continue;
    } else {
      console.log("✅ MATCH FOUND");
      console.log("DB Row:", existing);
    }

    // ✅ UPDATE ONLY MATCHED ROW
    const { error } = await db
      .from("requests")
      .update({
        Status: status || "Processed",

        ProcessedDate: new Date().toISOString(),

        OrderRegDt: r["Order Reg. Dt"] || "",
        DeliveryNo: r["Delivery No"] || "",
        BillNo: r["BillNo & Image"] || "",
        BillingDt: r["Billing Dt"] || "",
        BilledQty: Number(r["Billed Qty"] || 0),
        TransportName: r["Transport Name"] || "",
        TransportMode: r["Transport Mode"] || "",
        Docket: r["Docket"] || "",
        PackingDetail: r["Packing Detail"] || "",
        EWayBillNo: r["E-Way Bill No"] || "",
        GSTInvoiceNo: r["GST Invoice No."] || ""
        
      })
      .eq("OrderNo", orderNo)
      .eq("PartNo", partNo.replace(/\s/g,""));

    if(!error){
      updated++;
    } else {
      console.error(error);
      skipped++;
    }
  }

  hideLoader();

  showPopup(`Upload Complete ✅\nUpdated: ${updated}\nSkipped: ${skipped}`);

  loadAdmin(window.activeTab);
}
