// ---------- SAFE STORAGE ----------

function debounce(fn, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}  
  
  
  
 function getUser() {
  try {
    return JSON.parse(localStorage.getItem("user"));
  } catch (e) {
    localStorage.removeItem("user");
    return null;
  }
}

// ---------- UTIL ----------
function showLoader() {
  document.getElementById("loader").classList.remove("hidden");
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");

function showPopup(msg) {
  const popup = document.getElementById("popup");
  const msgEl = document.getElementById("popupMsg");

  msgEl.innerText = msg;
  popup.classList.remove("hidden");

  // small animation
  popup.style.opacity = "0";
  setTimeout(() => {
    popup.style.opacity = "1";
  }, 50);
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

async function login() {

  if (isLoggingIn) return;
  isLoggingIn = true;

  const branchEl = document.getElementById("branch");
  const passwordEl = document.getElementById("password");

  // 🔥 NEW: Button elements
  const btn = document.getElementById("loginBtn");
  const text = document.getElementById("loginText");
  const spinner = document.getElementById("loginSpinner");

  if (!branchEl || !passwordEl) {
    showPopup("UI error: reload page");
    isLoggingIn = false;
    return;
  }

  const branch = branchEl.value;
  const password = passwordEl.value;

  if (!branch || !password) {
    showPopup("Please select branch and enter password");
    isLoggingIn = false;
    return;
  }

  // 🔥 START BUTTON LOADING
  if (btn && text && spinner) {
    btn.disabled = true;
    text.innerText = "Signing in...";
    spinner.classList.remove("hidden");
  }

  showLoader(); // (optional: you can remove later if button loader feels enough)

  try {
    const payload = {
      action: "login",
      branch: branch,
      password: password
    };

    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));

      if (data.role === "admin") {
        loadAdmin();
      } else {
        loadBranch();
      }

    } else {
      showPopup("Invalid credentials!");
    }

  } catch (err) {
    console.error(err);
    showPopup("Network error!");
  }

  // 🔥 STOP BUTTON LOADING (ALWAYS RUNS)
  if (btn && text && spinner) {
    btn.disabled = false;
    text.innerText = "Login";
    spinner.classList.add("hidden");
  }

  hideLoader();
  isLoggingIn = false;
}

// ---------- SUBMIT ----------
async function submitAll() {
  if (isSubmitting) return;

  const user = getUser();

  const orderType = document.getElementById("orderType").value;
  const orderFor = document.getElementById("orderFor").value;
  const machineNo = document.getElementById("machineNo").value;
  const customerName = document.getElementById("customerName").innerText;
  const contactNo = document.getElementById("contactNo").value;

  const warrantyStatus = document.getElementById("warrantyStatus").value;
  const employeeName = document.getElementById("employeeName").value;
  const approvedBy = document.getElementById("approvedBy").value;
  const callId = document.getElementById("callId").value;
  
// ✅ ALWAYS MANDATORY
  if (!orderType || !orderFor || !employeeName) {
    showPopup("Please fill all mandatory (*) fields");
    return;
  }
  
  // ✅ VOR → EVERYTHING REQUIRED
  if (orderType === "VOR") {
    if (
      !machineNo ||
      !contactNo ||
      !warrantyStatus ||
      !approvedBy ||
      !callId
    ) {
      showPopup("All fields are mandatory for VOR order ❗");
      return;
    }
  }
  
  // ✅ CUSTOMER ORDER RULE
  if (orderFor === "Customer") {
    if (!machineNo || !contactNo || !warrantyStatus) {
      showPopup("Machine No, Warranty & Contact No required for Customer order");
      return;
    }
  }
  const rows = document.querySelectorAll("#tableBody tr");


  // ❗ CHECK IF ANY PART IS STILL LOADING
  for (let row of rows) {
    const descEl = row.querySelector(".desc");
  
    if (descEl && descEl.classList.contains("shimmer-text")) {
      showPopup("Please wait ❗ Part details are still loading.\nDo not proceed until all part names are loaded.");
      return;
    }
  }

  

  // ✅ NEW: Check if at least ONE valid row exists
  let hasValidRow = false;
// 🔥 GET SAFE TEMP ORDER ID FROM SERVER
  const tempRes = await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "getNextTempId" })
  });
  
  const tempData = await tempRes.json();
  
  const tempOrderNo = tempData.tempOrderNo;
  for (let row of rows) {
    const partNo = row.querySelector(".partNo").value.trim();
    const qty = row.querySelector(".qty").value;

    if (partNo && qty) {
      hasValidRow = true;
      break;
    }
  }

  if (!hasValidRow) {
    showPopup("Please enter at least one valid part");
    return;
  }

  isSubmitting = true;
  showLoader();

  try {
    for (let row of rows) {

      const partNo = row.querySelector(".partNo").value.trim();
      const qty = row.querySelector(".qty").value;
      const desc = row.querySelector(".desc").innerText.trim();

      // ✅ Skip empty rows instead of breaking app
      if (!partNo || !qty) continue;

      if (!desc || desc === "Not Found") {
        showPopup("Invalid Part Number in one of the rows");
        continue;
      }

      const payload = {
        action: "submit",
        branch: user.branch,
        orderType,
        orderFor,
        warrantyStatus,
        employeeName,
        approvedBy,
        callId,
        machineNo,
        customerName,
        contactNo,
        partNo,
        qty,
        description: desc,
        tempOrderNo: tempOrderNo,
      };

      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      console.log("RESPONSE:", result);
    }

    showPopup("Submitted successfully!");
    document.getElementById("tableBody").innerHTML = "";
    addRow();

  } catch (err) {
    console.error(err);
    showPopup("Error submitting!");
  }

  // ✅ ALWAYS RESET
  hideLoader();
  isSubmitting = false;
}

async function loadTrackOrders() {

  showLoader();

  const user = getUser();

  try {
    const res = await fetch(API, {
      method: "POST",
      body: JSON.stringify({ action: "getRequests" })
    });

    const data = await res.json();

    const today = new Date();
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(today.getDate() - 7);

    // ✅ READ FILTER VALUES SAFELY (before rendering)
    const fromDateVal = document.getElementById("fromDate")?.value || "";
    const toDateVal = document.getElementById("toDate")?.value || "";
    const searchPartVal = (document.getElementById("searchPart")?.value || "").toLowerCase();

    console.log("DATA SAMPLE:", data[0]);
    
    // ✅ FILTER DATA FIRST (IMPORTANT FIX)
    const filteredData = data.filter(d => {

      if (d.branch !== user.branch) return false;

      // Convert "3/26/2026 18:33:05"
        // Convert to YYYY-MM-DD string
      // ✅ SAFE DATE PARSING
      if (!d.date) return false;
              
        // ✅ USE ISO DATE DIRECTLY
       // ✅ Convert UTC → Local date (IST)
        const localDate = new Date(d.date);
        
        // format YYYY-MM-DD in LOCAL time
        const rowDateStr = `${localDate.getFullYear()}-${(localDate.getMonth()+1).toString().padStart(2,'0')}-${localDate.getDate().toString().padStart(2,'0')}`;

      // Default 7 days
        if (!fromDateVal && !toDateVal) {
        
          const todayStr = new Date().toISOString().split("T")[0];
        
          const sevenDaysAgo = new Date();
          sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
          const sevenDaysAgoStr = sevenDaysAgo.toISOString().split("T")[0];
        
          if (rowDateStr < sevenDaysAgoStr) return false;
        }

        // From date
        if (fromDateVal && rowDateStr < fromDateVal) return false;
        
        // To date
        if (toDateVal && rowDateStr > toDateVal) return false;

      // Search
        if (searchPartVal) {
          const found = d.items.some(item =>
            (item.partNo || "").toLowerCase().includes(searchPartVal)
          );
        
          if (!found) return false;
        }

      return true;
    });

    // ✅ BUILD UI
    let html = `

    <div class="space-y-4">

      <!-- TOP BAR -->
      <div class="flex justify-between items-center bg-gray-900 px-5 py-3 rounded-xl border border-gray-700">

        <p class="font-semibold text-yellow-400 text-lg">
          ${user.branch}
        </p>

        <div class="flex gap-3">
          <button onclick="loadCreateOrder()"
            class="px-4 py-1.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-yellow-400">
            Create New Order
          </button>

          <button
            class="px-4 py-1.5 rounded-lg bg-gray-800 text-yellow-400 border border-gray-700">
            Track Orders
          </button>
        </div>

        <button onclick="logout()"
          class="px-4 py-2 bg-yellow-400 text-black rounded-lg">
          Logout
        </button>

      </div>

      <!-- FILTERS -->
      <div class="bg-gray-900 p-4 rounded-xl border border-gray-700 flex gap-4 flex-wrap">

        <input id="fromDate" placeholder="From Date"
          class="bg-black border border-gray-600 text-white px-3 py-2 rounded"/>

        <input id="toDate" placeholder="To Date"
          class="bg-black border border-gray-600 text-white px-3 py-2 rounded"/>

        <input type="text" id="searchPart"
          placeholder="Search Part No"
          class="bg-black border border-gray-600 text-white px-3 py-2 rounded"/>

        <button onclick="loadTrackOrders()"
          class="bg-yellow-400 text-black px-4 py-2 rounded">
          Apply
        </button>
        
        <button onclick="clearFilters()"
          class="bg-gray-800 border border-gray-600 text-gray-300 px-4 py-2 rounded hover:bg-gray-700 hover:text-white transition">
          Clear
        </button>

      </div>

      <!-- TABLE -->
      <div class="bg-gray-900 p-5 rounded-xl border border-gray-700">

        <table class="w-full text-sm border border-gray-700 table-fixed bg-gray-800">
          <thead class="bg-black text-yellow-400">
            <tr>
              <th class="p-2">Date</th>
              <th class="p-2">Type</th>
              <th class="p-2">For</th>
              <th class="p-2">Machine</th>
              <th class="p-2">Customer</th>
              <th class="p-2">Part</th>
              <th class="p-2">Qty</th>
              <th class="p-2">Description</th>
              <th class="p-2">Order No</th>
              <th class="p-2">Status</th>
            </tr>
          </thead>
          <tbody>
    `;

    let index = 0;

    filteredData.forEach(d => {
    
      const rowClass = index % 2 === 0 ? "bg-gray-800" : "bg-gray-900";
    
      html += `
        <tr class="${rowClass} border-t border-gray-700 text-gray-200 text-center cursor-pointer"
            onclick="toggleItems(${index})">
    
          <td>${new Date(d.date).toLocaleDateString()}</td>
          <td>${d.orderType}</td>
          <td>${d.orderFor}</td>
          
          <td>${d.machineNo}</td>
          <td>${d.customerName}</td>
          <td>${d.items.length} Items</td>
          <td>-</td>
          <td>-</td>
          <td>${d.orderNo || "-"}</td>
          <td>${d.status}</td>
        </tr>
    
        <!-- EXPANDABLE ROW -->
        <tr id="items-${index}" class="hidden bg-black">
          <td colspan="10" class="p-3 text-left">
    
            ${d.items.map(item => `
              <div class="flex justify-between border-b border-gray-700 py-1 text-sm">
                <span class="w-[20%]">${item.partNo}</span>
                <span class="w-[50%]">${item.description}</span>
                <span class="w-[20%] text-right">Qty: ${item.qty}</span>
              </div>
            `).join("")}
    
          </td>
        </tr>
      `;
    
      index++;
    });

    html += `</tbody></table></div></div>`;

    document.getElementById("mainContent").innerHTML = html;

    // ✅ INIT DATE PICKER AFTER RENDER
    flatpickr("#fromDate", {
      dateFormat: "Y-m-d",
      maxDate: "today",
      defaultDate: fromDateVal || null
    });

    flatpickr("#toDate", {
      dateFormat: "Y-m-d",
      maxDate: "today",
      defaultDate: toDateVal || null
    });

  } catch (err) {
    console.error(err);
    showPopup("Error loading orders");
  }

  hideLoader();
}


function clearFilters() {

  // Clear inputs
  const fromEl = document.getElementById("fromDate");
  const toEl = document.getElementById("toDate");
  const searchEl = document.getElementById("searchPart");

  if (fromEl) fromEl.value = "";
  if (toEl) toEl.value = "";
  if (searchEl) searchEl.value = "";

  // Reload default view (last 7 days)
  loadTrackOrders();
}

function updateTotal() {
  let total = 0;

  document.querySelectorAll("#tableBody tr").forEach(row => {
    const valueText = row.querySelector(".value")?.innerText || "0";
    const value = Number(valueText.replace(/,/g, "")) || 0;
    total += value;
  });

  document.getElementById("totalValue").innerText = total.toLocaleString();
}


function toggleItems(i) {
  const row = document.getElementById("items-" + i);
  if (row) row.classList.toggle("hidden");
}

async function loadHQOrders(filter = "Pending") {

  showLoader();

  const res = await fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "getRequests" })
  });

  const data = await res.json();

  // 🔥 FILTER
  let filtered = data;
  if (filter !== "All") {
    filtered = data.filter(d => d.status === filter);
  }

  // 🔥 PROCESSED TODAY
  const today = new Date().toDateString();
  const processedToday = data.filter(d =>
    d.status === "Processed" &&
    new Date(d.date).toDateString() === today
  ).length;

  // 🔥 TABLE START
  let html = `
    <div class="mb-3 text-sm text-gray-300">
      Processed Today: <span class="text-yellow-400 font-semibold">${processedToday}</span>
    </div>

    <table class="w-full text-sm text-center border border-gray-700 bg-gray-800">
      <thead class="bg-black text-yellow-400">
        <tr>
          <th class="p-2 text-center">Temp / PO</th>
          <th class="p-2 text-center">Date</th>
          <th class="p-2 text-center">Branch</th>
          <th class="p-2 text-center">Employee</th>
          <th class="p-2 text-center">Type</th>
          <th class="p-2 text-center">For</th>
          <th class="p-2 text-center">Approved By</th>
          <th class="p-2 text-center">Value</th>
          <th class="p-2 text-center">Items</th>
          <th class="p-2 text-center">Status</th>
          <th class="p-2 text-center">Action</th>
        </tr>
      </thead>
      <tbody>
  `;

  // 🔥 LOOP (THIS WAS MISSING)
  filtered.forEach((d, index) => {

    const isVOR = d.orderType === "VOR";

    html += `
     <tr onclick="toggleHQ(${index})"
      class="border-t border-gray-700 cursor-pointer ${isVOR ? 'bg-red-900/30' : 'bg-gray-900'}">

        <td class="text-yellow-400 font-semibold">${d.tempOrderNo}</td>
        <td class="text-center">${new Date(d.date).toLocaleDateString()}</td>
        <td class="text-center">${d.branch}</td>
        <td class="text-center">${d.employeeName || "-"}</td>
        <td class="text-center">${d.orderType}</td>
        <td class="text-center">${d.orderFor}</td>
        <td class="text-center">${d.approvedBy || "-"}</td>
        <td class="text-green-400">₹ ${d.totalValue || 0}</td>
        <td class="text-center">${d.items.length}</td>
        <td class="text-center">${d.status}</td>



      </tr>

    <tr id="hq-${index}" class="hidden bg-black">
      <td colspan="11" class="p-3">
    
        <div class="space-y-2 text-sm">
    
          ${d.items.map(item => `
            <div class="flex justify-between border-b border-gray-700 py-1">
              <span class="w-[30%]">${item.partNo}</span>
              <span class="w-[50%]">${item.description}</span>
              <span class="w-[20%] text-right">Qty: ${item.qty}</span>
            </div>
          `).join("")}
    
          <!-- PO INPUT -->
          <div class="flex justify-center gap-2 mt-3">
            <input id="po-${index}" placeholder="Enter PO Number"
              class="bg-black border border-gray-600 px-3 py-2 rounded w-60 text-center"/>
    
            <button onclick="event.stopPropagation(); processOrder('${d.tempOrderNo}', ${index})"
              class="bg-green-500 px-4 py-2 rounded">
              Process
            </button>
          </div>
    
        </div>
    
      </td>
    </tr>

      
    `;
  });

  // 🔥 CLOSE TABLE
  html += `</tbody></table>`;

  document.getElementById("hqOrders").innerHTML = html;

  hideLoader();
}

function toggleHQ(i) {
  const row = document.getElementById("hq-" + i);
  if (row) row.classList.toggle("hidden");
}
  

async function processOrder(tempOrderNo, index) {

  const poNo = document.getElementById("po-" + index).value;

  if (!poNo) {
    showPopup("Enter PO Number");
    return;
  }

  showLoader();

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "updateOrder",
      tempOrderNo: tempOrderNo,
      orderNo: poNo
    })
  });

  hideLoader();
  showPopup("Order Processed!");

  loadHQOrders("Pending");
}
