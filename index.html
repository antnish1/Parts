function calc(tr){
const dnp = Number(tr.querySelector(".dnp").innerText) || 0;
const qty = Number(tr.querySelector(".qty").value) || 0;

tr.querySelector(".val").innerText = dnp * qty;
calcTotal();
}

document.querySelectorAll(".val").forEach(v => t += Number(v.innerText)||0);

// ---------- SUBMIT ----------
async function submitOrder(){

const user = getUser();
const machineNo = document.getElementById("machineNo").value;
const customerName = document.getElementById("customerName").value;


const orderType = document.getElementById("orderType").value;
const orderFor = document.getElementById("orderFor").value;
const approvedBy = document.getElementById("approvedBy").value;
const machineType = document.getElementById("machineType").value;

// BASIC REQUIRED
if(!orderType || !orderFor){
  return showPopup("Order Details are mandatory ❗");
}

// VOR RULE
if(orderType === "VOR"){
  if(!approvedBy || !machineNo || !customerName || !machineType){
    return showPopup("All fields mandatory for VOR ❗");
  }
}

// SOP / ZSPL RULES
if(orderType === "SOP" || orderType === "ZSPL"){

  if(!orderFor){
    return showPopup("Order For required ❗");
  }

  if(orderFor === "Customer"){
    if(!machineNo || !machineType){
      return showPopup("Machine No & Type required ❗");
    }
  }
}
  
if(orderFor === "Customer" && (!machineNo || !customerName)){
  return showPopup("Fill machine & customer ❗");
}

const rows = document.querySelectorAll("#tbody tr");

const orderNo = "T" + Math.floor(1000000 + Math.random()*9000000);

const inserts = [];

rows.forEach(r=>{

  const part = r.querySelector(".part").value.trim();
  const qty = r.querySelector(".qty").value.trim();
  const desc = r.querySelector(".desc").innerText;
  const dnp = Number(r.querySelector(".dnp").innerText)||0;

  // ❗ VALIDATION
  if(part && !qty){
    showPopup("Qty is required for all parts ❗");
    throw new Error("Qty missing");
  }

  if(!part) return;

inserts.push({
  Branch: user.Branch,

  OrderType: orderType,
  OrderFor: orderFor,

  EmployeeName: user.Name || "",
  ApprovedBy: approvedBy,

  CallID: document.getElementById("callId").value || "",
  MachineNo: machineNo,
  CustomerName: customerName,

  PartNo: part,
  Qty: qty,
  Description: desc,
  DNP: dnp,
  Value: dnp * qty,

  OrderNo: orderNo,
  Status: "Pending"
});

});



if(!inserts.length){
  return showPopup("At least one Part Number is required ❗");
}

showLoader();

const { error } = await db.from("requests").insert(inserts);

hideLoader();

if(error) return showPopup("Submit failed");

showPopup("Submitted ✅ Order No: "+orderNo);

loadCreate();
}

    .eq("Status", "Pending");

  // ✅ GET UNIQUE ORDER COUNT
  const uniqueOrders = [...new Set(data.map(d => d.OrderNo))];
  const count = uniqueOrders.length;

  const el = document.getElementById("pendingCount");

  if(el){
    if(count > 0){
      el.innerText = count;
      el.classList.remove("hidden");
    } else {
      el.classList.add("hidden");
    }
  }
}

function renderHQ(status){

const data = window.HQ_DATA.filter(o=> status==="All" || o.Status===status);

let html = `
<table class="w-full text-sm bg-gray-800 text-center">
<thead class="text-yellow-400 text-center">
<tr>
<th>Date</th>
<th>Branch</th>
<th>Machine</th>
<th>Parts</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody>
`;

data.forEach((o,i)=>{

const total = o.items.reduce((s,x)=>s+Number(x.Value||0),0);

html += `
<tr onclick="toggleHQ(${i})" class="bg-gray-900 hover:bg-gray-800 transition rounded-lg shadow cursor-pointer">
<td>${new Date(o.created_at).toLocaleDateString()}</td>
<td class="text-center">${o.Branch}</td>
<td class="text-center">${o.MachineNo}</td>
<td>${o.items.length}</td>
<td>₹ ${total}</td>
<td>${o.Status}</td>
</tr>


`;
});

html += "</tbody></table>";

document.getElementById("hqTable").innerHTML = html;
}

function toggleHQ(i){
document.getElementById("hq-"+i).classList.toggle("hidden");
}

async function processOrder(orderNo,i){

const po = document.getElementById("po-"+i).value;

if(!po) return showPopup("Enter PO number");

showLoader();

await db
.from("requests")
.update({ Status:"Processed", OrderNo:po })
.eq("OrderNo", orderNo);

hideLoader();
loadPendingCount();
showPopup("Processed ✅");

loadAdmin("Pending");
}

msg.innerHTML = `

</p>

`;

  class="bg-yellow-400 px-5 py-2 text-black rounded min-w-[100px]">
  Save
</button>

<button onclick="closePopup()"
  class="bg-gray-700 px-5 py-2 rounded min-w-[100px]">
  Cancel
</button>

</div>
`;

},100);
}



async function saveNewMachine(machineNo){

const customer = document.getElementById("manualCustomer").value.trim();

if(!customer){
  showPopup("Enter customer name");
  return;
}

// save to DB
const { error } = await db
.from("machine_master")
.insert([{
  MachineNo: machineNo,
  CustomerName: customer
}]);

if(error){
  console.error(error);
  showPopup("Error saving machine");
  return;
}

// update UI
document.getElementById("customerName").value = customer;

closePopup();
showPopup("Saved ✅");
}
