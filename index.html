<!DOCTYPE html>
<html>
<head>
  <title>Parts System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>


<style>
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.shimmer {
  background: linear-gradient(
    to right,
    #ffe4e6 8%,   /* very light pink */
    #fecdd3 18%,  /* soft pink highlight */
    #ffe4e6 33%
  );
  background-size: 800px 100%;
  animation: shimmer 1.2s infinite linear;
  border-radius: 6px;
  height: 14px;
}
</style>


  
<body class="bg-black text-white p-6">

<div id="app"></div>

<!-- Loader -->
<div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center">
  <div class="bg-white p-5 rounded shadow">Loading...</div>
</div>

<!-- Popup -->
<div id="popup" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-30">
  <div class="bg-white p-6 rounded shadow text-center">
    <p id="popupMsg" class="mb-4"></p>
    <button onclick="closePopup()" class="bg-blue-600 text-white px-4 py-2 rounded">OK</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwxs9HPm1ceUyU5dPnKphiFOZzCoOb78-rPMNteYwgyFIS_Agn6U4Ch8zEjqX9io1kp/exec";

let isSubmitting = false;
let isLoggingIn = false;

// ---------- SAFE STORAGE ----------

function debounce(fn, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}  
  
  
  
 function getUser() {
  try {
    return JSON.parse(localStorage.getItem("user"));
  } catch (e) {
    localStorage.removeItem("user");
    return null;
  }
}

// ---------- UTIL ----------
function showLoader() {
  document.getElementById("loader").classList.remove("hidden");
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");
}

function showPopup(msg) {
  document.getElementById("popupMsg").innerText = msg;
  document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

// ---------- INIT ----------
window.onload = () => {
  try {
    const user = getUser();

    if (user && user.branch && user.role) {
      user.role === "admin" ? loadAdmin() : loadBranch();
    } else {
      localStorage.clear(); // 🔥 important
      loadLogin();
    }

  } catch (e) {
    localStorage.clear();
    loadLogin();
  }
};

// ---------- LOGIN ----------
function loadLogin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
      <h2 class="text-xl font-bold mb-4">Login</h2>

      <select id="branch" class="w-full p-2 border mb-3">
        <option value="">Select Branch</option>
        <option>DAMOH</option>
        <option>ANUPPUR</option>
        <option>DINDORI</option>
        <option>MANDLA</option>
        <option>NARSINGHPUR</option>
        <option>BALAGHAT</option>
        <option>SEONI</option>
        <option>KATNI</option>
        <option>JABALPUR</option>
        <option>HQ</option>
      </select>

      <input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3"/>

      <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 w-full rounded">
        Login
      </button>
    </div>
  `;
}

async function login() {

  if (isLoggingIn) return;
  isLoggingIn = true;

  const branchEl = document.getElementById("branch");
  const passwordEl = document.getElementById("password");

  if (!branchEl || !passwordEl) {
    showPopup("UI error: reload page");
    isLoggingIn = false;
    return;
  }

  const branch = branchEl.value;
  const password = passwordEl.value;

  if (!branch || !password) {
    showPopup("Please select branch and enter password");
    isLoggingIn = false;
    return;
  }

  showLoader();

  try {
    const payload = {
      action: "login",
      branch: branch,
      password: password
    };

    const res = await fetch(API, {
      method: "POST",
      
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.status === "success") {
      localStorage.setItem("user", JSON.stringify(data));

      if (data.role === "admin") {
        loadAdmin();
      } else {
        loadBranch();
      }

    } else {
      showPopup("Invalid credentials!");
    }

  } catch (err) {
    console.error(err);
    showPopup("Network error!");
  }

  hideLoader();
  isLoggingIn = false;
}

function logout() {
  if (isSubmitting) {
    showPopup("Please wait, submitting...");
    return;
  }

  localStorage.removeItem("user");
  document.getElementById("app").innerHTML = "";

  setTimeout(loadLogin, 100);
}

// ---------- BRANCH ----------
function loadBranch() {
  const user = getUser();

  if (!user || !user.branch) {
    showPopup("Session error, please login again");
    logout();
    return;
  }

document.getElementById("app").innerHTML = `

<div class="max-w-6xl mx-auto space-y-4">

  <!-- TOP BAR -->
  <div class="flex justify-between items-center bg-gray-900 px-5 py-3 rounded-xl border border-gray-700">
    <p class="font-semibold text-yellow-400 text-lg">
      ${user.branch}
    </p>

    <button onclick="logout()"
      class="px-4 py-2 rounded-lg bg-yellow-400 text-black font-semibold hover:bg-yellow-500 transition">
      Logout
    </button>
  </div>

  <!-- HEADER -->
  <div class="bg-gray-900 p-5 rounded-xl border border-gray-700 space-y-4">

    <div class="grid grid-cols-2 gap-4">
      <select id="orderType" class="bg-black border border-gray-600 rounded p-2 text-white">
        <option value="">Order Type</option>
        <option>SOP</option>
        <option>VOR</option>
        <option>SPL</option>
        <option>ZMAC</option>
      </select>

      <select id="orderFor" class="bg-black border border-gray-600 rounded p-2 text-white">
        <option value="">Order For</option>
        <option>Customer</option>
        <option>Stock</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-4">

      <div>
        <input id="machineNo" placeholder="Machine Number"
          class="bg-black border border-gray-600 rounded p-2 w-full text-white"/>

        <p id="customerName" class="text-sm text-gray-400 mt-1">--</p>
      </div>

      <input id="contactNo" placeholder="Contact Number"
        class="bg-black border border-gray-600 rounded p-2 text-white"/>
    </div>

  </div>

  <!-- TABLE -->
  <div class="bg-gray-900 p-5 rounded-xl border border-gray-700">

    <table class="w-full text-sm border border-gray-700 table-fixed">
      <thead class="bg-black text-yellow-400">
        <tr>
          <th class="p-2 text-center w-[200px]">Part No</th>
          <th class="p-2 text-center w-[90px]">Qty</th>
          <th class="p-2 text-center">Part Name</th>
          <th class="p-2 text-center w-[60px] border-l border-gray-700"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="mt-4 flex gap-3">
      <button onclick="addRow()"
        class="bg-yellow-400 text-black px-4 py-2 rounded hover:bg-yellow-500">
        + Add Item
      </button>

      <button onclick="submitAll()"
        class="bg-yellow-500 text-black px-4 py-2 rounded hover:bg-yellow-600">
        Submit
      </button>
    </div>

  </div>

</div>
`;

  // MACHINE FETCH
  document.getElementById("machineNo").addEventListener("blur", async function () {
    const machineNo = this.value.trim();
    if (!machineNo) return;

    try {
      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "getMachine",
          machineNo: machineNo
        })
      });

      const customerEl = document.getElementById("customerName");

        // START loading animation
        customerEl.classList.add("shimmer");
        customerEl.innerText = "";
        
        try {
          const res = await fetch(API, {
            method: "POST",
            body: JSON.stringify({
              action: "getMachine",
              machineNo: machineNo
            })
          });
        
          const data = await res.json();
        
          // STOP loading animation
          customerEl.classList.remove("shimmer");
          customerEl.innerText = data.customer || "Not Found";
        
        } catch (err) {
          customerEl.classList.remove("shimmer");
          customerEl.innerText = "Error";
        }

    } catch (err) {
      document.getElementById("customerName").innerText = "Error";
    }
  });

  addRow();
}

function addRow() {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td class="p-1">
      <input class="partNo border rounded px-2 py-1 w-full focus:ring-2 focus:ring-blue-400"/>
    </td>

    <td class="p-1">
      <input type="number" max="99999"
        class="qty border rounded px-2 py-1 w-full text-center focus:ring-2 focus:ring-blue-400"/>
    </td>

    <td class="p-1">
      <div class="desc text-gray-700 truncate text-center"></div>
    </td>

    <td class="p-1 text-center border-l">
      <button onclick="this.closest('tr').remove()"
        class="w-7 h-7 flex items-center justify-center rounded-full bg-red-100 text-red-600 hover:bg-red-200 hover:scale-110 transition">
        ✕
      </button>
    </td>
  `;

  // PART FETCH (unchanged logic)
      row.querySelector(".partNo").addEventListener("input", debounce(async function () {
    
        const partNo = this.value.trim();
        if (!partNo) return;
    
        try {
          const descEl = row.querySelector(".desc");
    
    // START loading animation
    descEl.classList.add("shimmer");
    descEl.innerText = "";
    
    try {
      const res = await fetch(`${API}?partNo=${encodeURIComponent(partNo)}`);
      const data = await res.json();
    
      // STOP loading
      descEl.classList.remove("shimmer");
      descEl.innerText = data.description || "Not Found";
    
    } catch (err) {
      descEl.classList.remove("shimmer");
      descEl.innerText = "Error";
    }

    } catch (err) {
      row.querySelector(".desc").innerText = "Error";
    }

  }, 400));

const index = document.querySelectorAll("#tableBody tr").length;
row.className = index % 2 === 0 ? "bg-white" : "bg-gray-50";
  
  document.getElementById("tableBody").appendChild(row);
}

// ---------- SUBMIT ----------
async function submitAll() {
  if (isSubmitting) return;

  const user = getUser();

  const orderType = document.getElementById("orderType").value;
  const orderFor = document.getElementById("orderFor").value;
  const machineNo = document.getElementById("machineNo").value;
  const customerName = document.getElementById("customerName").innerText;
  const contactNo = document.getElementById("contactNo").value;

  if (!orderType || !orderFor || !machineNo || !contactNo) {
    showPopup("Fill all header fields!");
    return;
  }

  const rows = document.querySelectorAll("#tableBody tr");

  // ✅ NEW: Check if at least ONE valid row exists
  let hasValidRow = false;

  for (let row of rows) {
    const partNo = row.querySelector(".partNo").value.trim();
    const qty = row.querySelector(".qty").value;

    if (partNo && qty) {
      hasValidRow = true;
      break;
    }
  }

  if (!hasValidRow) {
    showPopup("Please enter at least one valid part");
    return;
  }

  isSubmitting = true;
  showLoader();

  try {
    for (let row of rows) {

      const partNo = row.querySelector(".partNo").value.trim();
      const qty = row.querySelector(".qty").value;
      const desc = row.querySelector(".desc").innerText.trim();

      // ✅ Skip empty rows instead of breaking app
      if (!partNo || !qty) continue;

      if (!desc || desc === "Not Found") {
        showPopup("Invalid Part Number in one of the rows");
        continue;
      }

      const payload = {
        action: "submit",
        branch: user.branch,
        orderType,
        orderFor,
        machineNo,
        customerName,
        contactNo,
        partNo,
        qty,
        description: desc
      };

      const res = await fetch(API, {
        method: "POST",
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      console.log("RESPONSE:", result);
    }

    showPopup("Submitted successfully!");
    document.getElementById("tableBody").innerHTML = "";
    addRow();

  } catch (err) {
    console.error(err);
    showPopup("Error submitting!");
  }

  // ✅ ALWAYS RESET
  hideLoader();
  isSubmitting = false;
}
// ---------- ADMIN ----------
function loadAdmin() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
      <div class="flex justify-between mb-4">
        <h2 class="text-xl font-bold">Admin Panel</h2>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>

      <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-2 rounded mb-3">
        Load Data
      </button>

      <table class="w-full border text-sm">
        <thead class="bg-gray-200">
          <tr>
            <th>Branch</th>
            <th>Part No</th>
            <th>Qty</th>
            <th>Order No</th>
            <th>Status</th>
            <th>Save</th>
          </tr>
        </thead>
        <tbody id="adminTable"></tbody>
      </table>
    </div>
  `;
}

async function loadData() {
  showLoader();

  const res = await fetch(API, {
    method: "POST",
  
    body: JSON.stringify({ action: "getRequests" })
  });

  const data = await res.json();
  hideLoader();

  let html = "";

  data.forEach(d => {
    html += `
      <tr>
        <td>${d.branch}</td>
        <td>${d.partNo}</td>
        <td>${d.qty}</td>
        <td><input value="${d.orderNo || ""}" id="order${d.row}" class="border p-1"/></td>
        <td>
          <select id="status${d.row}">
            <option ${d.status=="Pending"?"selected":""}>Pending</option>
            <option ${d.status=="Ordered"?"selected":""}>Ordered</option>
            <option ${d.status=="Delivered"?"selected":""}>Delivered</option>
          </select>
        </td>
        <td><button onclick="saveRow(${d.row})" class="bg-green-600 text-white px-2 py-1">Save</button></td>
      </tr>
    `;
  });

  document.getElementById("adminTable").innerHTML = html;
}

async function saveRow(row) {
  showLoader();

  const orderNo = document.getElementById("order"+row).value;
  const status = document.getElementById("status"+row).value;

  await fetch(API, {
    method: "POST",
  
    body: JSON.stringify({
      action: "updateOrder",
      row: row,
      orderNo: orderNo,
      status: status
    })
  });

  hideLoader();
  showPopup("Updated!");
}
</script>

</body>
</html>
