<!DOCTYPE html>
<html>
<head>
  <title>Parts Connect Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-white">

<div id="app"></div>

<!-- LOADER -->
<div id="loader" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-gray-900 border border-gray-700 px-6 py-5 rounded-xl flex flex-col items-center gap-4">
    <div class="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-yellow-400 font-semibold">Processing...</p>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="hidden fixed inset-0 flex items-center justify-center bg-black/70 z-50">
  <div class="bg-gray-900 border border-gray-700 p-6 rounded-xl text-center w-[300px]">
    <p id="popupMsg"></p>
    <div id="popupActions" class="mt-4 flex justify-center"></div>
  </div>
</div>



<style>
.menu-btn {
  position: relative;
  padding: 10px 18px;
  background: #1f2937;
  border: 1px solid #374151;
  border-radius: 10px;
  color: #e5e7eb;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.25s ease;
}

/* 🔥 HOVER EFFECT */
.menu-btn:hover {
  background: linear-gradient(135deg, #facc15, #fde047);
  color: black;
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 6px 18px rgba(250, 204, 21, 0.25);
}

/* 🔥 ACTIVE CLICK */
.menu-btn:active {
  transform: scale(0.96);
}

/* 🔥 SUBTLE GLOW */
.menu-btn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
}

.menu-btn:hover::after {
  opacity: 1;
}
</style>


  
<script>
const { createClient } = supabase;

const db = createClient(
  "https://ubkwtjyvbdvepzbxoikq.supabase.co",
  "sb_publishable_L-SrVLzVHoSt9OKGAu1eTQ_UslGY7m3"
);

// ---------- UTIL ----------
function showLoader(){ document.getElementById("loader").classList.remove("hidden"); }
function hideLoader(){ document.getElementById("loader").classList.add("hidden"); }

function showPopup(msg){

document.getElementById("popupMsg").innerText = msg;

document.getElementById("popupActions").innerHTML = `
<button onclick="closePopup()"
class="bg-yellow-400 px-5 py-2 text-black rounded">
OK
</button>
`;

document.getElementById("popup").classList.remove("hidden");
}

  
function closePopup(){
  document.getElementById("popup").classList.add("hidden");
}

function getUser(){
  try { return JSON.parse(localStorage.getItem("user")); }
  catch { return null; }
}

// ---------- INIT ----------
window.onload = () => {
  const user = getUser();
  if(user) loadBranch();
  else loadLogin();
};

// ---------- LOGIN ----------
async function loadLogin(){

document.getElementById("app").innerHTML = `
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 p-6 rounded-xl w-80 space-y-4 border border-gray-700">

    <h1 class="text-yellow-400 text-xl text-center font-semibold">
      Parts Connect Portal
    </h1>

    <select id="branch" class="w-full bg-black p-2 border border-gray-600 rounded"></select>

    <input id="password" type="password" placeholder="Password"
      class="w-full bg-black p-2 border border-gray-600 rounded"/>

    <button onclick="login()" class="w-full bg-yellow-400 text-black py-2 rounded font-semibold">
      Login
    </button>

  </div>
</div>
`;

const { data } = await db.from("users").select("Branch");
const unique = [...new Set(data.map(d => d.Branch))];

const el = document.getElementById("branch");
el.innerHTML = `<option value="">Select Branch</option>`;
unique.forEach(b => el.innerHTML += `<option>${b}</option>`);
}

async function login(){

const branch = document.getElementById("branch").value;
const password = document.getElementById("password").value;

if(!branch || !password) return showPopup("Fill all fields");

showLoader();

const { data } = await db
.from("users")
.select("*")
.eq("Branch", branch)
.eq("Password", password)
.single();

hideLoader();

if(!data) return showPopup("Invalid credentials");

localStorage.setItem("user", JSON.stringify(data));
loadBranch();
}

// ---------- BRANCH ----------
function loadBranch(){

const user = getUser();
const isAdmin = user.Role === "admin" || user.Branch === "HQ";
  
document.getElementById("app").innerHTML = `
<div class="max-w-7xl mx-auto px-6 py-5 space-y-5">

  <div class="space-y-4">

    <!-- HEADER -->
    <div class="w-full bg-gradient-to-r from-gray-900 via-black to-gray-900 
    border border-gray-700 rounded-xl px-6 py-4 shadow-lg">
      <h1 class="text-2xl font-bold text-yellow-400 tracking-wide">
        PARTS CONNECT PORTAL :
        <span class="text-white ml-2">${user.Branch}</span>
      </h1>
    </div>

    <!-- MENU -->
    <div class="w-full flex justify-between items-center bg-gray-900 px-4 py-3 rounded-xl border border-gray-700">

      <div class="flex gap-3">
        ${!isAdmin ? `
          <button onclick="loadCreate()" class="menu-btn">New Order</button>
          <button onclick="loadTrack()" class="menu-btn">Track Orders</button>
        ` : ``}
      </div>

      <button onclick="logout()" 
      class="bg-yellow-400 hover:bg-yellow-300 transition px-4 py-2 text-black rounded-lg font-semibold shadow-md">
        Logout
      </button>

    </div>

  </div>

  <!-- ✅ IMPORTANT: ADD THIS -->
  <div id="main" class="w-full"></div>

</div>
`;

if(isAdmin){
  loadAdmin("Pending");
}else{
  loadCreate();
}
  
}

function logout(){
localStorage.clear();
loadLogin();
}

// ---------- CREATE ----------
function loadCreate(){

document.getElementById("main").innerHTML = `
<div class="space-y-4">

<div class="bg-gray-900 p-4 rounded-xl border grid grid-cols-2 gap-3">
  <input id="machineNo" placeholder="Machine No" class="bg-black p-2 border"/>
  <input id="customerName" placeholder="Customer Name" class="bg-black p-2 border"/>
</div>

<div class="bg-gray-900 p-5 rounded-xl border">

<table class="w-full text-sm bg-gray-800">
<thead class="bg-black text-yellow-400">
<tr>
<th>Part</th><th>Qty</th><th>Desc</th><th>DNP</th><th>Cat</th><th>Value</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="flex gap-2 mt-4">
<button onclick="addRow()" class="bg-yellow-400 px-3 py-1 text-black">+ Add</button>
<button onclick="submitOrder()" class="bg-green-500 px-3 py-1 text-black">Submit</button>
</div>

<div class="text-right mt-2 text-yellow-400">
Total: ₹ <span id="total">0</span>
</div>

</div>
</div>
`;

addRow();

// MACHINE FETCH
document.getElementById("machineNo").addEventListener("blur", async function(){

const machineNo = this.value.trim();

if(!machineNo) return;

const { data, error } = await db
.from("machine_master")
.select("*")
.eq("MachineNo", machineNo);

// ✅ correct handling
if(data && data.length > 0){
  document.getElementById("customerName").value = data[0].CustomerName;
}
else{
  document.getElementById("customerName").value = "";
  showManualCustomerPopup(machineNo);
}

});
}   // ✅ THIS WAS MISSING

  
// ---------- ROW ----------
function addRow(){

const tr = document.createElement("tr");

tr.innerHTML = `
<td><input class="part bg-black w-full"/></td>
<td><input type="number" class="qty bg-black w-full"/></td>
<td class="desc text-center"></td>
<td class="dnp text-center"></td>
<td class="cat text-center"></td>
<td class="val text-center"></td>
<td><button onclick="this.closest('tr').remove(); calcTotal()">X</button></td>
`;

tr.querySelector(".part").addEventListener("blur", async function(){

const partNo = this.value.trim();

// ✅ FIX 1: ignore empty input
if(!partNo){
  tr.querySelector(".desc").innerText = "";
  tr.querySelector(".dnp").innerText = "";
  tr.querySelector(".cat").innerText = "";
  tr.querySelector(".val").innerText = "";
  calcTotal();
  return;
}

// FETCH
const { data } = await db
.from("part_master")
.select("*")
.eq("PartNo", partNo)
.single();

// ✅ FIX 2: show error only if user typed something wrong
if(!data){
  showPopup("Invalid Part Number ❗");
  return;
}

// SUCCESS
tr.querySelector(".desc").innerText = data.Description;
tr.querySelector(".dnp").innerText = data.DNP;
tr.querySelector(".cat").innerText = data.Cat1;

calc(tr);
});



tr.querySelector(".qty").addEventListener("input", () => calc(tr));

document.getElementById("tbody").appendChild(tr);
}

// ---------- CALC ----------
function calc(tr){
const dnp = Number(tr.querySelector(".dnp").innerText) || 0;
const qty = Number(tr.querySelector(".qty").value) || 0;

tr.querySelector(".val").innerText = dnp * qty;
calcTotal();
}

function calcTotal(){
let t = 0;
document.querySelectorAll(".val").forEach(v => t += Number(v.innerText)||0);
document.getElementById("total").innerText = t;
}

// ---------- SUBMIT ----------
async function submitOrder(){

const user = getUser();
const machineNo = document.getElementById("machineNo").value;
const customerName = document.getElementById("customerName").value;

if(!machineNo || !customerName) return showPopup("Fill machine & customer");

const rows = document.querySelectorAll("#tbody tr");

const orderNo = "T" + Math.floor(1000000 + Math.random()*9000000);

const inserts = [];

rows.forEach(r=>{
const part = r.querySelector(".part").value;
const qty = r.querySelector(".qty").value;
const desc = r.querySelector(".desc").innerText;
const dnp = Number(r.querySelector(".dnp").innerText)||0;

if(!part || !qty) return;

inserts.push({
Branch:user.Branch,
MachineNo:machineNo,
CustomerName:customerName,
PartNo:part,
Qty:qty,
Description:desc,
DNP:dnp,
Value:dnp*qty,
OrderNo:orderNo,
Status:"Pending"
});
});

if(!inserts.length) return showPopup("Add items");

showLoader();

const { error } = await db.from("requests").insert(inserts);

hideLoader();

if(error) return showPopup("Submit failed");

showPopup("Submitted ✅ Order No: "+orderNo);

loadCreate();
}


// ---------- TRACK ----------
async function loadTrack(){

const user = getUser();

showLoader();

const { data } = await db
.from("requests")
.select("*")
.eq("Branch", user.Branch)
.order("created_at", { ascending:false });

hideLoader();

// GROUP BY ORDER
const grouped = {};

data.forEach(r=>{
if(!grouped[r.OrderNo]){
grouped[r.OrderNo] = { ...r, items:[] };
}
grouped[r.OrderNo].items.push(r);
});

const orders = Object.values(grouped);

let html = `
<div class="bg-gray-900 p-4 rounded-xl border">

<table class="w-full text-sm">
<thead class="text-yellow-400">
<tr>
<th>Date</th>
<th>Machine</th>
<th>Customer</th>
<th>Parts</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody>
`;

orders.forEach((o,i)=>{

const total = o.items.reduce((s,x)=>s+Number(x.Value||0),0);

html += `
<tr onclick="toggleRow(${i})" class="border-t cursor-pointer">
<td>${new Date(o.created_at).toLocaleDateString()}</td>
<td>${o.MachineNo}</td>
<td>${o.CustomerName}</td>
<td>${o.items.length}</td>
<td>₹ ${total}</td>
<td>${o.Status}</td>
</tr>

<tr id="row-${i}" class="hidden bg-black">
<td colspan="6">
${o.items.map(it=>`
<div class="flex justify-between border-b py-1">
<span>${it.PartNo}</span>
<span>${it.Description}</span>
<span>${it.Qty}</span>
<span>₹ ${it.Value}</span>
</div>
`).join("")}
</td>
</tr>
`;
});

html += `</tbody></table></div>`;

document.getElementById("main").innerHTML = html;
}

function toggleRow(i){
document.getElementById("row-"+i).classList.toggle("hidden");
}

// ---------- PROCESS ----------
async function processOrder(orderNo,i){

const po = document.getElementById("po-"+i).value;

if(!po) return showPopup("Enter PO number");

showLoader();

await db
.from("requests")
.update({ Status:"Processed", OrderNo:po })
.eq("OrderNo", orderNo);

hideLoader();

showPopup("Processed ✅");

loadAdmin("Pending");
}


function showManualCustomerPopup(machineNo){

const popup = document.getElementById("popup");
const msg = document.getElementById("popupMsg");

msg.innerHTML = `
<div class="space-y-4 text-center">

<p class="text-yellow-400 font-semibold">
Machine not found ❗
</p>

<p class="text-sm text-gray-400">
Enter Customer Name
</p>

<input id="manualCustomer"
  class="w-full bg-black border border-gray-600 px-3 py-2 rounded text-center"
  placeholder="Customer Name"/>

</div>
`;

// ✅ BUTTONS BELOW (clean separation)
document.getElementById("popupActions").innerHTML = `
<div class="flex gap-3 justify-center w-full">

<button onclick="saveNewMachine('${machineNo}')"
  class="bg-yellow-400 px-5 py-2 text-black rounded min-w-[100px]">
  Save
</button>

<button onclick="closePopup()"
  class="bg-gray-700 px-5 py-2 rounded min-w-[100px]">
  Cancel
</button>

</div>
`;

document.getElementById("popup").classList.remove("hidden");

// autofocus
setTimeout(()=>{
  document.getElementById("manualCustomer")?.focus();
},100);
}



async function saveNewMachine(machineNo){

const customer = document.getElementById("manualCustomer").value.trim();

if(!customer){
  showPopup("Enter customer name");
  return;
}

// save to DB
const { error } = await db
.from("machine_master")
.insert([{
  MachineNo: machineNo,
  CustomerName: customer
}]);

if(error){
  console.error(error);
  showPopup("Error saving machine");
  return;
}

// update UI
document.getElementById("customerName").value = customer;

closePopup();
showPopup("Saved ✅");
}
