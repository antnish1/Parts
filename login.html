<!DOCTYPE html>
<html>
<head>
  <title>Parts Connect Portal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="login.css">
</head>

<body class="bg-gradient-to-br from-slate-900 via-gray-900 to-slate-800 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-4">

  <!-- Title -->
  <div class="text-center mb-8">
    <h1 class="text-3xl font-semibold text-white tracking-wide">
      Parts Connect Portal
    </h1>
  </div>

  <!-- Glass Card -->
  <div class="glass p-6 rounded-2xl">

    <!-- Branch -->
    <div class="field">
      <select id="branch" required>
        <option value=""></option>
        <option>DAMOH</option>
        <option>ANUPPUR</option>
        <option>DINDORI</option>
        <option>MANDLA</option>
        <option>NARSINGHPUR</option>
        <option>BALAGHAT</option>
        <option>SEONI</option>
        <option>KATNI</option>
        <option>JABALPUR</option>
        <option>HQ</option>
      </select>
      <label>Branch</label>
    </div>

    <!-- Password -->
    <div class="field mt-4 relative">
      <input id="password" type="password" required>
      <label>Password</label>

      <i id="eyeIcon" onclick="togglePass()" class="icon"></i>
    </div>

    <!-- Button -->
    <button onclick="login()" class="login-btn mt-6">
      <span id="btnText">Login</span>
      <span id="btnLoader" class="hidden"></span>
    </button>

    <!-- Error -->
    <p id="error" class="text-red-400 text-sm text-center mt-3 hidden"></p>

  </div>

</div>

<script src="config.js"></script>
<script src="login.js"></script>

</body>
</html>
