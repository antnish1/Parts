<!DOCTYPE html>
<html>
<head>
  <title>Parts Connect Portal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="login.css">
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md px-4">

  <!-- App Name -->
  <div class="text-center mb-8">
    <h1 class="text-2xl font-semibold text-gray-800 tracking-wide">
      Parts Connect Portal
    </h1>
  </div>

  <!-- Login Card -->
  <div class="bg-white rounded-2xl shadow-lg p-6">

    <!-- Branch -->
    <select id="branch" class="input mb-4" onchange="fetchRole()">
      <option value="">Select Branch</option>
      <option>DAMOH</option>
      <option>ANUPPUR</option>
      <option>DINDORI</option>
      <option>MANDLA</option>
      <option>NARSINGHPUR</option>
      <option>BALAGHAT</option>
      <option>SEONI</option>
      <option>KATNI</option>
      <option>JABALPUR</option>
      <option>HQ</option>
    </select>

    <!-- Password -->
    <div class="relative mb-4">
      <input id="password" type="password" placeholder="Password" class="input pr-10">

      <span id="eyeIcon" onclick="togglePass()" class="absolute right-3 top-3 cursor-pointer text-gray-500">
        👁️
      </span>
    </div>

    <!-- Login Button -->
    <button onclick="login()" class="btn w-full">
      Login
    </button>

    <!-- Error -->
    <p id="error" class="text-red-500 text-sm text-center mt-3 hidden"></p>

  </div>

</div>

<script src="config.js"></script>
<script src="login.js"></script>

</body>
</html>
